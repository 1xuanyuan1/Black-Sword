server {
    listen 80;
    listen [::]:80;
    server_name game.dduke.cn;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name game.dduke.cn;

    ssl_certificate /etc/nginx/ssl/game.dduke.cn/game.dduke.cn_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/game.dduke.cn/game.dduke.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:GameTLS:10m;
    ssl_session_timeout 10m;

    root /web/game/current;
    index index.html;
    gzip_static on;
    gzip_vary on;
    gzip_types application/wasm application/octet-stream application/javascript;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    location ~* \.pck$ {
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options nosniff always;
        try_files $uri $uri/ =404;
    }
}
